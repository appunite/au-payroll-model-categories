name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. 1.0.0, sha-abc1234)"
        required: true
      models_bucket:
        description: "GCS bucket with trained models"
        required: true

env:
  PROJECT_ID: au-ksef-ex
  REGION: europe-west1
  SERVICE: invoice-classifier
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $REGISTRY/$IMAGE_NAME:${{ inputs.image_tag }} \
            --project $PROJECT_ID \
            --region $REGION \
            --platform managed \
            --no-allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --max-instances 10 \
            --min-instances 0 \
            --cpu-boost \
            --execution-environment gen2 \
            --timeout 60 \
            --port 8080 \
            --add-volume name=models,type=cloud-storage,bucket=${{ inputs.models_bucket }} \
            --add-volume-mount volume=models,mount-path=/app/models
